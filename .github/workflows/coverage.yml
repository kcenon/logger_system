name: Code Coverage

on:
  push:
    branches: [ main, develop, phase-* ]
  pull_request:
    branches: [ main, develop ]

jobs:
  coverage:
    name: Coverage Analysis
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build lcov software-properties-common libssl-dev
        # Install GCC 13 for std::format support
        sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
        sudo apt-get update
        sudo apt-get install -y gcc-13 g++-13
        # Set GCC 13 as default
        sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 100
        sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 100
        # GTest is now fetched via CMake FetchContent

    - name: Checkout common_system (required dependency)
      uses: actions/checkout@v6
      with:
        repository: kcenon/common_system
        ref: main
        path: common_system

    - name: Configure CMake with coverage
      run: |
        echo "=== Build Configuration ==="
        echo "Build Mode: Debug with Coverage"
        echo "Common System: Required (Phase 2.2+)"
        echo "Directory structure:"
        ls -la . | head -20
        echo "==========================="

        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DLOGGER_ENABLE_COVERAGE=ON \
          -DBUILD_WITH_COMMON_SYSTEM=ON \
          -DLOGGER_BUILD_TESTS=ON \
          -DLOGGER_BUILD_INTEGRATION_TESTS=ON \
          -DCMAKE_PREFIX_PATH="/usr" \
          --debug-find || {
            echo "::error::CMake configuration failed for coverage build"
            cat build/CMakeFiles/CMakeOutput.log 2>/dev/null || echo "No output log"
            cat build/CMakeFiles/CMakeError.log 2>/dev/null || echo "No error log found"
            exit 1
          }

    - name: Build with coverage
      run: cmake --build build --config Debug

    - name: Run tests
      run: |
        cd build
        # Set timeout to 300 seconds (5 minutes) per test to prevent hanging
        # Coverage instrumentation can slow down tests significantly
        ctest -C Debug --output-on-failure --verbose --timeout 300 || true

    - name: Generate coverage report
      run: |
        cd build
        # The build uses gcc-13 (see Install dependencies step), which emits
        # .gcno files whose format is not understood by the system default
        # gcov-11 bundled with Ubuntu 22.04's lcov. Point lcov at gcov-13 so
        # it can actually read the coverage data.
        GCOV_TOOL=$(command -v gcov-13 || command -v gcov)
        echo "Using gcov tool: $GCOV_TOOL"

        # Capture coverage data
        lcov --gcov-tool "$GCOV_TOOL" --directory . --capture --output-file coverage.info || true

        # Filter out system headers and test files
        lcov --gcov-tool "$GCOV_TOOL" --remove coverage.info '/usr/*' '*/test/*' '*/tests/*' '*/examples/*' --output-file coverage_filtered.info || true

        # Generate HTML report
        genhtml coverage_filtered.info --output-directory coverage_html || true

        # Print summary
        lcov --gcov-tool "$GCOV_TOOL" --list coverage_filtered.info || true

    - name: Enforce coverage threshold
      run: |
        cd build
        if [ ! -f coverage_filtered.info ]; then
          echo "::error::coverage_filtered.info missing — cannot evaluate threshold"
          exit 1
        fi
        # lcov --summary prints lines like "  lines......: 78.5% (1234 of 1573 lines)"
        # Extract the percentage only if the second field actually looks
        # like one (lcov prints "branches...: no data found" when branch
        # instrumentation is off, which otherwise gets mis-parsed as "no").
        COVERAGE=$(lcov --summary coverage_filtered.info 2>&1 \
          | awk '/lines\.\.\.\./ && $2 ~ /%$/ { gsub("%", "", $2); print $2; exit }')
        BRANCH_COVERAGE=$(lcov --summary coverage_filtered.info 2>&1 \
          | awk '/branches\.\.\./ && $2 ~ /%$/ { gsub("%", "", $2); print $2; exit }')
        # Target gate: 80% line / 70% branch (acceptance criterion from #613).
        # The pre-existing failing tests that previously suppressed coverage
        # (EncryptedWriterTest.WriteAndDecrypt*, LoggerOtelIntegrationTest
        # .LoggerContextMethods, ConsoleWriterIntegrityTest.RoundTripOnStdout)
        # were repaired in #620 so their instrumented paths now count toward
        # coverage, clearing the 80% bar without requiring new tests.
        LINE_THRESHOLD=80
        BRANCH_THRESHOLD=70
        echo "Line coverage:   ${COVERAGE:-unknown}% (threshold: ${LINE_THRESHOLD}%)"
        echo "Branch coverage: ${BRANCH_COVERAGE:-unknown}% (threshold: ${BRANCH_THRESHOLD}%)"
        FAIL=0
        if [ -z "$COVERAGE" ] \
          || ! awk -v c="$COVERAGE" -v t="$LINE_THRESHOLD" 'BEGIN { exit !(c+0 >= t+0) }'; then
          echo "::error::Line coverage ${COVERAGE:-unknown}% is below threshold ${LINE_THRESHOLD}%"
          FAIL=1
        fi
        if [ -n "$BRANCH_COVERAGE" ] \
          && ! awk -v c="$BRANCH_COVERAGE" -v t="$BRANCH_THRESHOLD" 'BEGIN { exit !(c+0 >= t+0) }'; then
          echo "::error::Branch coverage ${BRANCH_COVERAGE}% is below threshold ${BRANCH_THRESHOLD}%"
          FAIL=1
        fi
        exit $FAIL

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: ./build/coverage_filtered.info
        flags: unittests
        name: logger_system-coverage
        fail_ci_if_error: false
        verbose: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload coverage artifacts
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: |
          build/coverage.info
          build/coverage_filtered.info
          build/coverage_html/
        retention-days: 7

    - name: Coverage summary
      if: always()
      run: |
        echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f build/coverage_filtered.info ]; then
          echo "Coverage data collected successfully." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Phase 0 Target: Establish baseline coverage" >> $GITHUB_STEP_SUMMARY
          echo "Phase 5 Target: 80%+ coverage" >> $GITHUB_STEP_SUMMARY
        else
          echo "No coverage data generated." >> $GITHUB_STEP_SUMMARY
        fi
